# Cluster kind mono-noeud (leger, fiable).
# Le control-plane est aussi schedulable et porte le label tier=storage
# pour heberger le hostPath du PV MongoDB (Pod 2 y est epingle).
# extraPortMappings : expose les NodePort sur localhost.
#   30080 -> frontend | 30090 -> Prometheus | 30030 -> Grafana
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ecommerce
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "tier=storage,ingress-ready=true"
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30090
        hostPort: 30090
        protocol: TCP
      - containerPort: 30030
        hostPort: 30030
        protocol: TCP
