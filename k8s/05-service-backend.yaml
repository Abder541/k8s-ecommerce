# Service ClusterIP qui expose le backend (port 3000) aux autres Pods du cluster.
# Le frontend (Nginx) fait un reverse-proxy vers backend-service:3000.
# Seul le port 3000 (backend) est expose ; MongoDB reste isole dans le Pod.
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: ecommerce
  labels:
    app: backend-db
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: backend-db
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
