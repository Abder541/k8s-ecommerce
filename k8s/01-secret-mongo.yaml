# Secret pour les credentials MongoDB
# Les valeurs sont en base64 :
#   admin       -> YWRtaW4=
#   Sup3rS3cret -> U3VwM3JTM2NyZXQ=
#   ecommerce   -> ZWNvbW1lcmNl
# En production, on utiliserait sealed-secrets, Vault ou un KMS externe.
apiVersion: v1
kind: Secret
metadata:
  name: mongo-credentials
  namespace: ecommerce
type: Opaque
data:
  MONGO_USER: YWRtaW4=
  MONGO_PASSWORD: U3VwM3JTM2NyZXQ=
  MONGO_DB: ZWNvbW1lcmNl
