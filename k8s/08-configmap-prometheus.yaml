# Configuration Prometheus (bonus observabilite - Pod 3)
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ecommerce
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s

    scrape_configs:
      # Prometheus se scrape lui-meme
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Backend e-commerce : endpoint /metrics expose par prom-client
      - job_name: 'ecommerce-backend'
        metrics_path: /metrics
        static_configs:
          - targets: ['backend-service:3000']
            labels:
              service: 'backend'
