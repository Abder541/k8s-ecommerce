server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA React : fallback vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy /api/* vers le Service Kubernetes du backend.
    # Resolveur charge a l'execution par /docker-entrypoint.d/40-set-resolver.sh
    # (lit le 1er nameserver de /etc/resolv.conf) et variable pour DNS paresseux.
    location /api/ {
        resolver __NGINX_RESOLVER__ valid=10s ipv6=off;
        set $backend_upstream "backend-service.ecommerce.svc.cluster.local";
        proxy_pass         http://$backend_upstream:3000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # Health endpoint pour probes K8s
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
