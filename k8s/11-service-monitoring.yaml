# Services NodePort pour acceder a Prometheus et Grafana depuis l'hote
# (bonus observabilite - Pod 3)
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: ecommerce
  labels:
    app: monitoring
    component: prometheus
spec:
  type: NodePort
  selector:
    app: monitoring
  ports:
    - name: prometheus
      port: 9090
      targetPort: 9090
      nodePort: 30090
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: ecommerce
  labels:
    app: monitoring
    component: grafana
spec:
  type: NodePort
  selector:
    app: monitoring
  ports:
    - name: grafana
      port: 3000
      targetPort: 3000
      nodePort: 30030
      protocol: TCP
